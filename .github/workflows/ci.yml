name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # 不设 RUSTFLAGS=-D warnings —— 与 workspace `[lints]` 重叠会把 pedantic warning 升级为 error。
  # 关键 lint（unsafe/unwrap/expect/panic/dbg）已在 Cargo.toml 中 deny，足够把关。

jobs:
  check:
    name: check / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy
        # Workspace `[lints.clippy]` already denies unwrap/expect/panic/dbg.
        # Pedantic warnings stay as warnings (not -D) to keep CI green for stylistic-only nits.
        run: cargo clippy --workspace --all-targets
      - name: test
        run: cargo test --workspace --all-targets
